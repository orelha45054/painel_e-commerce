<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MNZ.painel — Grupo MNZ</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen" style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:#0B1B3D;">
  <form id="login-form" style="background:#fff;border-radius:16px;padding:32px;width:100%;max-width:340px;box-shadow:0 20px 50px rgba(0,0,0,.3)">
    <div style="font-weight:900;font-size:20px;letter-spacing:-.02em;margin-bottom:4px">MNZ<span style="color:#E5232A">.</span>painel</div>
    <div style="font-size:12px;color:#71717a;margin-bottom:22px">Entre com sua conta de administrador</div>
    <div class="field"><label>E-mail</label><input id="login-email" type="email" required style="width:100%" /></div>
    <div class="field"><label>Senha</label><input id="login-password" type="password" required style="width:100%" /></div>
    <div id="login-error" style="display:none;background:#fef2f2;color:#b91c1c;font-size:12.5px;border-radius:8px;padding:9px 12px;margin-bottom:14px"></div>
    <button id="login-btn" type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">Entrar</button>
  </form>
</div>

<!-- APP (só aparece depois do login) -->
<div class="app" id="app-screen" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo">MNZ<span>.</span>painel</div>
      <div class="sub">Grupo MNZ · admin</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <div class="avatar" id="user-avatar">MN</div>
      <div style="flex:1;min-width:0">
        <div class="name" id="user-email" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
      </div>
      <button id="logout-btn" class="icon-btn" style="color:rgba(255,255,255,.5)" title="Sair">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <h1 id="page-title">Painel geral</h1>
        <div class="subtitle" id="page-subtitle">Visão rápida da loja hoje</div>
      </div>
      <div class="topbar-right">
        <button class="bell">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="ping"></span>
        </button>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
